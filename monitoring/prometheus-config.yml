global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:

  # Métriques RAM / CPU / réseau par container Docker
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  # Métriques de la machine hôte (RAM, disque, CPU)
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

