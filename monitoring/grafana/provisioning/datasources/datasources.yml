apiVersion: 1

datasources:
  - name:      Loki
    uid:       loki
    type:      loki
    access:    proxy
    url:       http://loki:3100
    isDefault: true
    jsonData:
      maxLines: 1000

  - name:      Prometheus
    uid:       prometheus
    type:      prometheus
    access:    proxy
    url:       http://prometheus:9090
    isDefault: false
    jsonData:
      timeInterval: 15s
